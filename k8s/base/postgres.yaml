apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsboard-postgres
  namespace: opsboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opsboard-postgres
  template:
    metadata:
      labels:
        app: opsboard-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: opsboard
            - name: POSTGRES_USER
              value: opsboard
            - name: POSTGRES_PASSWORD
              value: replace-me
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U opsboard -d opsboard"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: opsboard-postgres
  namespace: opsboard
spec:
  selector:
    app: opsboard-postgres
  ports:
    - port: 5432
      targetPort: 5432
