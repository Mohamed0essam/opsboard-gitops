apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opsboard
  namespace: opsboard
spec:
  ingressClassName: nginx
  rules:
    - host: opsboard.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opsboard-frontend
                port:
                  number: 80
