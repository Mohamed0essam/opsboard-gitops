apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsboard-backend
  namespace: opsboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opsboard-backend
  template:
    metadata:
      labels:
        app: opsboard-backend
    spec:
      containers:
        - name: backend
          image: your-ecr-or-dockerhub/opsboard-backend:0.1.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: opsboard-backend-config
            - secretRef:
                name: opsboard-backend-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: opsboard-backend
  namespace: opsboard
spec:
  selector:
    app: opsboard-backend
  ports:
    - port: 8080
      targetPort: 8080
