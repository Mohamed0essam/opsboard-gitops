apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsboard-frontend
  namespace: opsboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opsboard-frontend
  template:
    metadata:
      labels:
        app: opsboard-frontend
    spec:
      containers:
        - name: frontend
          image: your-ecr-or-dockerhub/opsboard-frontend:0.1.0
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: opsboard-frontend
  namespace: opsboard
spec:
  selector:
    app: opsboard-frontend
  ports:
    - port: 80
      targetPort: 80
