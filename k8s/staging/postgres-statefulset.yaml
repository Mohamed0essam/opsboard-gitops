apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opsboard-postgres
spec:
  serviceName: opsboard-postgres
  replicas: 1
  selector:
    matchLabels:
      app: opsboard-postgres
  template:
    metadata:
      labels:
        app: opsboard-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: opsboard
            - name: POSTGRES_USER
              value: opsboard
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opsboard-postgres-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U opsboard -d opsboard"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U opsboard -d opsboard"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
